<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<title>Formulário de cadastro</title>

<style>
h1 {
    background-color: blue;
    color: white;
}

form {
    background-color: black;
    color: aliceblue;
    
}

input {
    display: block;
    
}
</style>

<script>
    

window.onload = function() {
    alert("Bem vindo ao formulário de cadastro!");
}

function maiusculo(campo) {
    campo.value = campo.value.toUpperCase();
}

function validarFormulario() {

    let nome = document.getElementById("nome").value;
    let cpf = document.getElementById("cpf").value;
    let endereco = document.getElementById("endereco").value;
    let ano = document.getElementById("ano").value;
    let telefone = document.getElementById("telefone").value;
    let estado = document.getElementById("estado").value;
    let cidade = document.getElementById("cidade").value;
    let senha = document.getElementById("senha").value;
    let confirmar = document.getElementById("confirmar").value;


    if (!nome || !cpf || !endereco || !ano || !telefone || !estado || !cidade || !senha || !confirmar) {
        alert("Todos os campos devem ser preenchidos!");
        return false;
    }
    if (ano < 0 || ano >= 2026) {
        alert("Ano de nascimento inválido!");
        return false;
    }
    if (senha === nome || confirmar === nome) {
        alert("A senha não pode ser igual ao nome!");
        return false;
    }
    if (senha !== confirmar) {
        alert("As senhas não coincidem!");
        return false;
    }

    alert("Cadastro realizado com sucesso!");
    return true;
}
</script>

</head>

<body>
    

<i>Bem vindo ao formulário de cadastro!</i>

<h1>Dados do candidato</h1>

<form onsubmit="return validarFormulario()">

<label>Nome</label>
<input type="text" id="nome" oninput="maiusculo(this)">

<label>CPF</label>
<input type="text" id="cpf" oninput="maiusculo(this)">

<label>Endereço</label>
<input type="text" id="endereco" oninput="maiusculo(this)">

<label>Ano de nascimento</label>
<input type="number" id="ano">

<label>Telefone</label>
<input type="text" id="telefone" oninput="maiusculo(this)">

<label>Estado</label>
<input type="text" id="estado" oninput="maiusculo(this)">

<label>Cidade</label>
<input type="text" id="cidade" oninput="maiusculo(this)">

<label>Senha</label>
<input type="password" id="senha" oninput="maiusculo(this)">

<label>Confirmação de senha</label>
<input type="password" id="confirmar" oninput="maiusculo(this)">

<button type="submit">Cadastrar</button>

</form>

</body>
</html>
