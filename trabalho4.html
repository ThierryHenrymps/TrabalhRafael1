<!DOCTYPE html>
<html lang="pt-br">

<head> 
<meta charset="utf-8">
<title>Formulario CEFET</title>
</head>

<body>
<form>
<p>
    <label for="nome">Nome</label>
    <input type="text" id="nome" name="Nome">
</p>
<p>
    <label for="email">E-mail</label>
    <input type="email" id="email" name="E-mail">
</p>
<p>
    <label for="cpf">CPF</label>
    <input type="text" id="cpf" name="CPF">
</p>
<p>
    <label for="password">Senha</label>
    <input type="password" id="password" name="Senha">
</p>
<p>
    <label for="civil">Solteiro</label>
    <input type="radio" id="Solteiro" name="Solteiro">
    <label for="Solteiro">Relacionamento Serio</label>
    <input type="radio" id="namorando" name="namorando">
    <label for="casado">casado</label>
    <input type="radio" id="casado" name="casado">
</p>
<p>
    <label for="algoritmos">ALgoritimo</label>
    <input type="checkbox" id="algoritimo" name="algoritimo">

    <label for="esturuta">estrutura de dados</label>
    <input type="checkbox" id="dados" name="dados">

    <label for="programacao">POO</label>
    <input type="checkbox" id="POO" name="POO">

    <label for="web">Programacao web</label>
    <input type="checkbox" id="web" name="web">

    <label for="redacao">redacao tecnica</label>
    <input type="checkbox" id="redacao" name="redacao">

    <label for="empreendorismo">empreendorismo</label>
    <input type="checkbox" id="empreendorismo" name="empreendorismo">

    <button type="reset">resetar</button>
    <button type="submit">enviar</button>
</p>
</form>





</body>

</html>
